<meta charset="utf-8" />

<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%232d9e52'/%3E%3Ctext x='16' y='22' text-anchor='middle' font-family='Inter%2C-apple-system%2Csans-serif' font-weight='700' font-size='18' fill='white'%3EH%3C/text%3E%3C/svg%3E" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #FAFAF7; --panel: #FFFFFE; --ink: #111110; --ink-2: #3A3A35;
    --muted: #6B6B63; --faint: #9A9A90; --line: #E8E6DF; --line-2: #F0EEE7;
    --accent: oklch(0.62 0.12 145); --accent-bg: oklch(0.96 0.03 145); --accent-ink: oklch(0.38 0.09 145);
    --warn-bg: oklch(0.96 0.04 75); --warn-ink: oklch(0.45 0.10 65);
    --rose-bg: oklch(0.95 0.03 25); --rose-ink: oklch(0.45 0.10 25);
    --blue-bg: oklch(0.96 0.03 250); --blue-ink: oklch(0.45 0.10 250);
    --amber-bg: oklch(0.96 0.05 80); --amber-ink: oklch(0.48 0.12 75);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--ink);
    font-family: 'Inter', -apple-system, sans-serif; font-size: 14px; line-height: 1.5;
    -webkit-font-smoothing: antialiased; }
  .mono { font-family: 'IBM Plex Mono', ui-monospace, monospace; }
  button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }
  input, textarea, select { font-family: inherit; font-size: inherit; color: inherit; }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
  .skeleton { animation: pulse 1.5s ease-in-out infinite; background: var(--line-2); border-radius: 4px; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin></script>

<script>
  const SUPABASE_URL = 'https://ytnkupxvzulgtvpdnvps.supabase.co';
  const SUPABASE_ANON_KEY = 'sb_publishable_kHM9zr0VEFsy_kNWRtdaXA_i0iSO3Dv';
  window.sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
</script>

<script type="text/babel">
const { useState, useEffect, useCallback, useRef } = React;
const ADMIN_EMAIL = 'nicolas@hypertalent.me';

// ── Avatar ──────────────────────────────────────────────────────────────────
function Avatar({ name, size = 32 }) {
  const initials = (name || '?').split(' ').slice(0, 2).map(w => w[0]).join('').toUpperCase();
  const hues = [145, 250, 60, 25, 200, 40, 290, 80];
  let hash = 0;
  for (const c of (name || '')) hash = (hash * 31 + c.charCodeAt(0)) & 0xffffffff;
  const hue = hues[Math.abs(hash) % hues.length];
  const bg = `oklch(0.88 0.06 ${hue})`;
  const color = `oklch(0.38 0.09 ${hue})`;
  return (
    <div style={{
      width: size, height: size, borderRadius: '50%', background: bg, color,
      display: 'inline-flex', alignItems: 'center', justifyContent: 'center',
      fontSize: size * 0.36, fontWeight: 700, flexShrink: 0, letterSpacing: '-0.02em',
    }}>{initials}</div>
  );
}

// ── Btn ─────────────────────────────────────────────────────────────────────
function Btn({ children, variant = 'ghost', onClick, disabled, small }) {
  const styles = {
    primary: { background: 'var(--ink)', color: '#fff', border: 'none' },
    accent:  { background: 'var(--accent)', color: '#fff', border: 'none' },
    danger:  { background: 'var(--rose-bg)', color: 'var(--rose-ink)', border: '1px solid oklch(0.88 0.04 25)' },
    ghost:   { background: 'var(--panel)', color: 'var(--ink)', border: '1px solid var(--line)' },
    warn:    { background: 'var(--warn-bg)', color: 'var(--warn-ink)', border: '1px solid oklch(0.88 0.05 75)' },
  };
  return (
    <button
      onClick={onClick}
      disabled={disabled}
      style={{
        ...styles[variant],
        padding: small ? '5px 12px' : '8px 16px',
        borderRadius: 6, fontSize: small ? 12.5 : 13.5, fontWeight: 500,
        opacity: disabled ? 0.5 : 1, cursor: disabled ? 'not-allowed' : 'pointer',
        display: 'inline-flex', alignItems: 'center', gap: 6,
        transition: 'opacity 0.1s',
      }}
    >{children}</button>
  );
}

// ── Tag ──────────────────────────────────────────────────────────────────────
function Tag({ children, tone = 'neutral' }) {
  const colors = {
    neutral: { bg: '#F0EEE7', color: 'var(--muted)' },
    accent:  { bg: 'var(--accent-bg)', color: 'var(--accent-ink)' },
    blue:    { bg: 'var(--blue-bg)', color: 'var(--blue-ink)' },
    warn:    { bg: 'var(--warn-bg)', color: 'var(--warn-ink)' },
    rose:    { bg: 'var(--rose-bg)', color: 'var(--rose-ink)' },
    amber:   { bg: 'var(--amber-bg)', color: 'var(--amber-ink)' },
    green:   { bg: 'var(--accent-bg)', color: 'var(--accent-ink)' },
  };
  const c = colors[tone] || colors.neutral;
  return (
    <span style={{
      display: 'inline-block', padding: '2px 8px', borderRadius: 999,
      fontSize: 11.5, fontWeight: 500, background: c.bg, color: c.color,
    }}>{children}</span>
  );
}

function statusTone(status) {
  if (status === 'Hired')        return 'accent';
  if (status === 'Interviewing') return 'amber';
  if (status === 'Rejected')     return 'rose';
  return 'neutral';
}

// ── Login ────────────────────────────────────────────────────────────────────
function FieldInput({ label, type = 'text', value, onChange, onKeyDown }) {
  return (
    <div>
      <div style={{ fontSize: 12.5, fontWeight: 500, color: 'var(--muted)', marginBottom: 5 }}>{label}</div>
      <input
        type={type} value={value}
        onChange={e => onChange(e.target.value)}
        onKeyDown={onKeyDown}
        style={{
          width: '100%', border: '1px solid var(--line)', borderRadius: 6,
          padding: '9px 11px', fontSize: 13.5, outline: 'none',
          background: 'var(--bg)',
        }}
      />
    </div>
  );
}

function LoginScreen({ onSession }) {
  const [email, setEmail] = useState(ADMIN_EMAIL);
  const [password, setPassword] = useState('');
  const [error, setError] = useState('');
  const [loading, setLoading] = useState(false);

  const handleLogin = async () => {
    setLoading(true); setError('');
    const { data, error: e } = await window.sb.auth.signInWithPassword({ email, password });
    if (e || data?.user?.email !== ADMIN_EMAIL) {
      setError(e?.message || 'Access denied.');
      setLoading(false); return;
    }
    onSession(data.session);
  };

  return (
    <div style={{ minHeight: '100vh', display: 'flex', alignItems: 'center', justifyContent: 'center', background: 'var(--bg)', padding: 24 }}>
      <div style={{ width: '100%', maxWidth: 380 }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginBottom: 32 }}>
          <div style={{ width: 34, height: 34, borderRadius: 9, background: 'var(--ink)', display: 'inline-flex', alignItems: 'center', justifyContent: 'center' }}>
            <span style={{ color: '#fff', fontWeight: 700, fontSize: 15 }}>H</span>
          </div>
          <div>
            <div style={{ fontWeight: 700, fontSize: 15, letterSpacing: '-0.02em' }}>HyperHire</div>
            <div style={{ fontSize: 11.5, color: 'var(--faint)', marginTop: -1 }}>Admin panel</div>
          </div>
        </div>
        <div style={{ border: '1px solid var(--line)', borderRadius: 12, background: 'var(--panel)', padding: '28px 26px' }}>
          <div style={{ fontSize: 18, fontWeight: 700, letterSpacing: '-0.02em', marginBottom: 20 }}>Sign in</div>
          <div style={{ display: 'flex', flexDirection: 'column', gap: 12 }}>
            <FieldInput label="Email" type="email" value={email} onChange={setEmail} />
            <FieldInput label="Password" type="password" value={password} onChange={setPassword}
              onKeyDown={e => e.key === 'Enter' && handleLogin()} />
          </div>
          {error && <div style={{ marginTop: 12, fontSize: 13, color: 'var(--rose-ink)', padding: '8px 12px', background: 'var(--rose-bg)', borderRadius: 6 }}>{error}</div>}
          <div style={{ marginTop: 18 }}>
            <Btn variant="primary" onClick={handleLogin} disabled={loading}>
              {loading ? 'Signing in…' : 'Sign in'}
            </Btn>
          </div>
        </div>
      </div>
    </div>
  );
}

// ── Skeleton rows ────────────────────────────────────────────────────────────
function SkeletonCards({ count = 3 }) {
  return (
    <div style={{ display: 'flex', flexDirection: 'column', gap: 12 }}>
      {Array.from({ length: count }).map((_, i) => (
        <div key={i} style={{ border: '1px solid var(--line)', borderRadius: 10, background: 'var(--panel)', padding: 20 }}>
          <div style={{ display: 'flex', gap: 12, alignItems: 'flex-start' }}>
            <div className="skeleton" style={{ width: 42, height: 42, borderRadius: '50%' }} />
            <div style={{ flex: 1, display: 'flex', flexDirection: 'column', gap: 8 }}>
              <div className="skeleton" style={{ height: 14, width: '30%' }} />
              <div className="skeleton" style={{ height: 12, width: '50%' }} />
              <div className="skeleton" style={{ height: 12, width: '70%' }} />
            </div>
          </div>
        </div>
      ))}
    </div>
  );
}

// ── Stat card ────────────────────────────────────────────────────────────────
function StatCard({ label, value, tone }) {
  const colors = {
    default: { bg: 'var(--panel)', border: 'var(--line)', val: 'var(--ink)' },
    amber:   { bg: 'var(--amber-bg)', border: 'oklch(0.88 0.05 80)', val: 'var(--amber-ink)' },
    green:   { bg: 'var(--accent-bg)', border: 'oklch(0.88 0.06 145)', val: 'var(--accent-ink)' },
    rose:    { bg: 'var(--rose-bg)', border: 'oklch(0.88 0.04 25)', val: 'var(--rose-ink)' },
    warn:    { bg: 'var(--warn-bg)', border: 'oklch(0.88 0.05 75)', val: 'var(--warn-ink)' },
  };
  const c = colors[tone || 'default'];
  return (
    <div style={{ background: c.bg, border: `1px solid ${c.border}`, borderRadius: 8, padding: '14px 18px', minWidth: 90, flex: 1 }}>
      <div style={{ fontSize: 22, fontWeight: 700, letterSpacing: '-0.03em', color: c.val }}>{value}</div>
      <div style={{ fontSize: 12, color: 'var(--muted)', marginTop: 1 }}>{label}</div>
    </div>
  );
}

// ── Recruiters panel ──────────────────────────────────────────────────────────
function RecruitersPanel() {
  const [recruiters, setRecruiters] = useState([]);
  const [loading, setLoading] = useState(true);
  const [tab, setTab] = useState('pending');
  const [actionId, setActionId] = useState(null);

  const load = useCallback(async () => {
    setLoading(true);
    const { data } = await window.sb.from('hh_recruiters').select('*').order('created_at', { ascending: false });
    setRecruiters(data || []);
    setLoading(false);
  }, []);

  useEffect(() => { load(); }, [load]);

  const approve = async (email) => {
    setActionId(email);
    await window.sb.from('hh_recruiters').update({ is_vetted: true, is_archived: false }).eq('email', email);
    setRecruiters(prev => prev.map(r => r.email === email ? { ...r, is_vetted: true, is_archived: false } : r));
    setActionId(null);
  };

  const revoke = async (email) => {
    setActionId(email);
    await window.sb.from('hh_recruiters').update({ is_vetted: false }).eq('email', email);
    setRecruiters(prev => prev.map(r => r.email === email ? { ...r, is_vetted: false } : r));
    setActionId(null);
  };

  const archive = async (email) => {
    setActionId(email);
    await window.sb.from('hh_recruiters').update({ is_archived: true, is_vetted: false }).eq('email', email);
    setRecruiters(prev => prev.map(r => r.email === email ? { ...r, is_archived: true, is_vetted: false } : r));
    setActionId(null);
  };

  const restore = async (email) => {
    setActionId(email);
    await window.sb.from('hh_recruiters').update({ is_archived: false }).eq('email', email);
    setRecruiters(prev => prev.map(r => r.email === email ? { ...r, is_archived: false } : r));
    setActionId(null);
  };

  const active     = recruiters.filter(r => !r.is_archived);
  const pending    = active.filter(r => !r.is_vetted);
  const approved   = active.filter(r => r.is_vetted);
  const archived   = recruiters.filter(r => r.is_archived);

  const displayed =
    tab === 'pending'  ? pending  :
    tab === 'approved' ? approved :
    tab === 'archived' ? archived : active;

  const tabs = [
    { id: 'pending',  label: 'Pending',  count: pending.length },
    { id: 'approved', label: 'Approved', count: approved.length },
    { id: 'all',      label: 'All',      count: active.length },
    { id: 'archived', label: 'Archived', count: archived.length },
  ];

  return (
    <div style={{ maxWidth: 860, margin: '0 auto', padding: '32px 24px' }}>
      <div style={{ marginBottom: 24 }}>
        <h1 style={{ margin: 0, fontSize: 22, fontWeight: 700, letterSpacing: '-0.02em' }}>Recruiters</h1>
        <p style={{ margin: '4px 0 0', fontSize: 13.5, color: 'var(--muted)' }}>
          Review applications and approve access. Approved recruiters can browse and submit to open roles.
        </p>
      </div>

      <div style={{ display: 'flex', gap: 10, marginBottom: 24 }}>
        <StatCard label="Pending review" value={pending.length} tone="warn" />
        <StatCard label="Approved" value={approved.length} tone="green" />
        <StatCard label="Archived" value={archived.length} />
      </div>

      <div style={{ display: 'flex', gap: 2, borderBottom: '1px solid var(--line)', marginBottom: 20 }}>
        {tabs.map(t => (
          <button key={t.id} onClick={() => setTab(t.id)} style={{
            padding: '9px 16px', fontSize: 13.5, fontWeight: 500,
            color: tab === t.id ? 'var(--ink)' : 'var(--muted)',
            borderBottom: tab === t.id ? '2px solid var(--ink)' : '2px solid transparent',
            marginBottom: -1, display: 'inline-flex', alignItems: 'center', gap: 8,
          }}>
            {t.label}
            <span className="mono" style={{ fontSize: 11, color: 'var(--faint)', padding: '1px 6px', background: '#F3F1EA', borderRadius: 999 }}>{t.count}</span>
          </button>
        ))}
      </div>

      {loading ? <SkeletonCards /> : displayed.length === 0 ? (
        <div style={{ padding: '60px 24px', textAlign: 'center', color: 'var(--muted)', fontSize: 13.5 }}>
          {tab === 'pending' ? 'No pending applications.' : tab === 'archived' ? 'No archived recruiters.' : 'No recruiters in this category.'}
        </div>
      ) : (
        <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
          {displayed.map(r => (
            <RecruiterCard
              key={r.email} recruiter={r}
              busy={actionId === r.email}
              onApprove={() => approve(r.email)}
              onRevoke={() => revoke(r.email)}
              onArchive={() => archive(r.email)}
              onRestore={() => restore(r.email)}
            />
          ))}
        </div>
      )}
    </div>
  );
}

// ── Recruiter card ────────────────────────────────────────────────────────────
function RecruiterCard({ recruiter: r, busy, onApprove, onRevoke, onArchive, onRestore }) {
  const [expanded, setExpanded] = useState(false);
  const daysAgo = r.created_at ? Math.floor((Date.now() - new Date(r.created_at)) / 86400000) : null;
  const fns = Array.isArray(r.functions) ? r.functions : [];
  const locs = Array.isArray(r.locations) ? r.locations : [];

  const borderColor = r.is_archived ? 'var(--line)' : r.is_vetted ? '1.5px solid var(--accent)' : 'var(--line)';

  return (
    <div style={{
      border: r.is_vetted && !r.is_archived ? '1.5px solid var(--accent)' : '1px solid var(--line)',
      borderRadius: 10, background: r.is_archived ? '#FAFAF7' : 'var(--panel)',
      padding: '18px 20px', opacity: r.is_archived ? 0.7 : 1,
      transition: 'border-color 0.15s',
    }}>
      <div style={{ display: 'flex', gap: 14, alignItems: 'flex-start' }}>
        <Avatar name={r.name} size={42} />
        <div style={{ flex: 1, minWidth: 0 }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 10, flexWrap: 'wrap', marginBottom: 4 }}>
            <span style={{ fontSize: 15, fontWeight: 600, letterSpacing: '-0.01em' }}>{r.name || '—'}</span>
            {r.is_archived
              ? <Tag tone="neutral">Archived</Tag>
              : r.is_vetted
                ? <Tag tone="accent">✓ Approved</Tag>
                : <Tag tone="warn">Pending review</Tag>}
            {daysAgo !== null && (
              <span style={{ fontSize: 12, color: 'var(--faint)', marginLeft: 'auto' }}>
                Applied {daysAgo === 0 ? 'today' : `${daysAgo}d ago`}
              </span>
            )}
          </div>
          <div style={{ display: 'flex', gap: 14, alignItems: 'center', flexWrap: 'wrap', fontSize: 13, color: 'var(--muted)' }}>
            <span>{r.email}</span>
            {r.linkedin_url && (
              <a href={r.linkedin_url} target="_blank" rel="noopener noreferrer"
                style={{ color: 'var(--blue-ink)', textDecoration: 'none' }}
                onClick={e => e.stopPropagation()}>LinkedIn ↗</a>
            )}
          </div>
          <div style={{ display: 'flex', gap: 6, flexWrap: 'wrap', marginTop: 10 }}>
            {r.years_exp && <Tag>{r.years_exp}</Tag>}
            {fns.map(f => <Tag key={f} tone="blue">{f}</Tag>)}
            {locs.map(l => <Tag key={l}>{l}</Tag>)}
          </div>
          {r.bio && (
            <div onClick={() => setExpanded(x => !x)} style={{
              marginTop: 12, fontSize: 13, color: 'var(--ink-2)', lineHeight: 1.6, cursor: 'pointer',
              display: expanded ? 'block' : '-webkit-box',
              WebkitLineClamp: expanded ? 'unset' : 2,
              WebkitBoxOrient: 'vertical',
              overflow: expanded ? 'visible' : 'hidden',
            }}>"{r.bio}"</div>
          )}
          {r.bio && r.bio.length > 120 && (
            <button onClick={() => setExpanded(x => !x)}
              style={{ fontSize: 12, color: 'var(--faint)', marginTop: 2, padding: 0 }}>
              {expanded ? 'Show less' : 'Show more'}
            </button>
          )}
        </div>
        <div style={{ display: 'flex', gap: 8, flexShrink: 0, alignItems: 'center', flexWrap: 'wrap', justifyContent: 'flex-end' }}>
          {r.is_archived ? (
            <Btn variant="ghost" small onClick={onRestore} disabled={busy}>{busy ? '…' : 'Restore'}</Btn>
          ) : r.is_vetted ? (
            <>
              <Btn variant="warn" small onClick={onRevoke} disabled={busy}>{busy ? '…' : 'Revoke'}</Btn>
              <Btn variant="danger" small onClick={onArchive} disabled={busy}>Archive</Btn>
            </>
          ) : (
            <>
              <Btn variant="danger" small onClick={onArchive} disabled={busy}>Archive</Btn>
              <Btn variant="accent" small onClick={onApprove} disabled={busy}>{busy ? '…' : '✓ Approve'}</Btn>
            </>
          )}
        </div>
      </div>
    </div>
  );
}

// ── Candidates panel ──────────────────────────────────────────────────────────
function CandidatesPanel() {
  const [submissions, setSubmissions] = useState([]);
  const [loading, setLoading] = useState(true);
  const [tab, setTab] = useState('all');
  const [search, setSearch] = useState('');

  const load = useCallback(async () => {
    setLoading(true);
    const { data, error } = await window.sb
      .from('hh_submissions')
      .select('*, hh_jobs(title, company_name)')
      .order('submitted_at', { ascending: false });
    if (!error) setSubmissions(data || []);
    setLoading(false);
  }, []);

  useEffect(() => { load(); }, [load]);

  const updateSubmission = useCallback((id, patch) => {
    setSubmissions(prev => prev.map(s => s.id === id ? { ...s, ...patch } : s));
  }, []);

  const counts = {
    all: submissions.length,
    Submitted: submissions.filter(s => s.status === 'Submitted').length,
    Interviewing: submissions.filter(s => s.status === 'Interviewing').length,
    Hired: submissions.filter(s => s.status === 'Hired').length,
    Rejected: submissions.filter(s => s.status === 'Rejected').length,
  };

  const tabs = [
    { id: 'all',          label: 'All' },
    { id: 'Submitted',    label: 'Submitted' },
    { id: 'Interviewing', label: 'Interviewing' },
    { id: 'Hired',        label: 'Hired' },
    { id: 'Rejected',     label: 'Archived' },
  ];

  const q = search.toLowerCase();
  const displayed = submissions
    .filter(s => tab === 'all' || s.status === tab)
    .filter(s => !q || s.candidate_name?.toLowerCase().includes(q) || s.candidate_email?.toLowerCase().includes(q) || s.recruiter_email?.toLowerCase().includes(q) || s.hh_jobs?.title?.toLowerCase().includes(q) || s.hh_jobs?.company_name?.toLowerCase().includes(q));

  return (
    <div style={{ maxWidth: 940, margin: '0 auto', padding: '32px 24px' }}>
      <div style={{ marginBottom: 24 }}>
        <h1 style={{ margin: 0, fontSize: 22, fontWeight: 700, letterSpacing: '-0.02em' }}>Candidate submissions</h1>
        <p style={{ margin: '4px 0 0', fontSize: 13.5, color: 'var(--muted)' }}>
          All candidates submitted by recruiters. Update pipeline status and add feedback.
        </p>
      </div>

      {/* Stats */}
      <div style={{ display: 'flex', gap: 10, marginBottom: 24, flexWrap: 'wrap' }}>
        <StatCard label="Total" value={counts.all} />
        <StatCard label="Awaiting review" value={counts.Submitted} tone="warn" />
        <StatCard label="Interviewing" value={counts.Interviewing} tone="amber" />
        <StatCard label="Hired" value={counts.Hired} tone="green" />
        <StatCard label="Rejected" value={counts.Rejected} tone="rose" />
      </div>

      {/* Tabs + search */}
      <div style={{ display: 'flex', alignItems: 'center', gap: 12, marginBottom: 20 }}>
        <div style={{ flex: 1, display: 'flex', gap: 2, borderBottom: '1px solid var(--line)' }}>
          {tabs.map(t => (
            <button key={t.id} onClick={() => setTab(t.id)} style={{
              padding: '9px 14px', fontSize: 13, fontWeight: 500,
              color: tab === t.id ? 'var(--ink)' : 'var(--muted)',
              borderBottom: tab === t.id ? '2px solid var(--ink)' : '2px solid transparent',
              marginBottom: -1, display: 'inline-flex', alignItems: 'center', gap: 7,
            }}>
              {t.label}
              <span className="mono" style={{ fontSize: 11, color: 'var(--faint)', padding: '1px 6px', background: '#F3F1EA', borderRadius: 999 }}>
                {t.id === 'all' ? counts.all : counts[t.id]}
              </span>
            </button>
          ))}
        </div>
        <input
          value={search} onChange={e => setSearch(e.target.value)}
          placeholder="Search candidates, roles…"
          style={{
            border: '1px solid var(--line)', borderRadius: 6, padding: '7px 11px',
            fontSize: 13, outline: 'none', background: 'var(--panel)', width: 220,
          }}
        />
      </div>

      {loading ? <SkeletonCards count={4} /> : displayed.length === 0 ? (
        <div style={{ padding: '60px 24px', textAlign: 'center', color: 'var(--muted)', fontSize: 13.5 }}>
          {search ? 'No results match your search.' : 'No submissions yet.'}
        </div>
      ) : (
        <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
          {displayed.map(s => (
            <SubmissionCard key={s.id} submission={s} onUpdate={updateSubmission} />
          ))}
        </div>
      )}
    </div>
  );
}

// ── Submission card ───────────────────────────────────────────────────────────
function SubmissionCard({ submission: s, onUpdate }) {
  const [status, setStatus] = useState(s.status || 'Submitted');
  const [note, setNote] = useState(s.rejection_note || '');
  const [saving, setSaving] = useState(false);
  const [pitchExpanded, setPitchExpanded] = useState(false);
  const [saved, setSaved] = useState(false);

  const job = s.hh_jobs;
  const submittedAt = s.submitted_at ? new Date(s.submitted_at).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }) : '—';

  const handleStatusChange = async (newStatus) => {
    setStatus(newStatus);
    if (newStatus !== 'Rejected') {
      await saveStatus(newStatus, note);
    }
  };

  const saveStatus = async (st, nt) => {
    setSaving(true);
    const patch = { status: st, updated_at: new Date().toISOString() };
    if (st === 'Hired') patch.hired_at = new Date().toISOString();
    if (nt !== undefined) patch.rejection_note = nt;
    await window.sb.from('hh_submissions').update(patch).eq('id', s.id);
    onUpdate(s.id, patch);
    setSaving(false);
    setSaved(true);
    setTimeout(() => setSaved(false), 1500);
  };

  const handleSaveNote = () => saveStatus(status, note);

  const borderColor = status === 'Hired' ? 'var(--accent)' : status === 'Interviewing' ? 'oklch(0.82 0.08 80)' : status === 'Rejected' ? 'oklch(0.88 0.04 25)' : 'var(--line)';

  return (
    <div style={{ border: `1.5px solid ${borderColor}`, borderRadius: 10, background: 'var(--panel)', padding: '18px 20px' }}>
      <div style={{ display: 'flex', gap: 14, alignItems: 'flex-start' }}>
        <Avatar name={s.candidate_name} size={42} />

        <div style={{ flex: 1, minWidth: 0 }}>
          {/* Header */}
          <div style={{ display: 'flex', alignItems: 'flex-start', gap: 10, flexWrap: 'wrap', marginBottom: 6 }}>
            <div style={{ flex: 1, minWidth: 0 }}>
              <div style={{ display: 'flex', alignItems: 'center', gap: 8, flexWrap: 'wrap' }}>
                <span style={{ fontSize: 15, fontWeight: 600, letterSpacing: '-0.01em' }}>{s.candidate_name}</span>
                <Tag tone={statusTone(status)}>{status}</Tag>
                {saved && <span style={{ fontSize: 12, color: 'var(--accent-ink)' }}>✓ Saved</span>}
              </div>
              <div style={{ fontSize: 12.5, color: 'var(--muted)', marginTop: 2 }}>
                {s.candidate_email}
                {s.linkedin_url && (
                  <a href={s.linkedin_url} target="_blank" rel="noopener noreferrer"
                    style={{ color: 'var(--blue-ink)', textDecoration: 'none', marginLeft: 10 }}>
                    LinkedIn ↗
                  </a>
                )}
              </div>
            </div>
            <div style={{ fontSize: 11.5, color: 'var(--faint)', textAlign: 'right', flexShrink: 0 }}>
              <div>{submittedAt}</div>
              <div style={{ marginTop: 1 }}>by {s.recruiter_email}</div>
            </div>
          </div>

          {/* Role */}
          {job && (
            <div style={{ fontSize: 13, color: 'var(--ink-2)', marginBottom: 10, display: 'flex', alignItems: 'center', gap: 6 }}>
              <span style={{ color: 'var(--faint)' }}>Applied for:</span>
              <strong>{job.title}</strong>
              <span style={{ color: 'var(--faint)' }}>at</span>
              <strong>{job.company_name}</strong>
            </div>
          )}

          {/* Pitch */}
          {s.pitch && (
            <div style={{ marginBottom: 12 }}>
              <div
                onClick={() => setPitchExpanded(x => !x)}
                style={{
                  fontSize: 13, color: 'var(--ink-2)', lineHeight: 1.6,
                  background: '#F7F6F2', borderRadius: 6, padding: '10px 12px',
                  cursor: 'pointer',
                  display: pitchExpanded ? 'block' : '-webkit-box',
                  WebkitLineClamp: pitchExpanded ? 'unset' : 2,
                  WebkitBoxOrient: 'vertical',
                  overflow: pitchExpanded ? 'visible' : 'hidden',
                }}>
                {s.pitch}
              </div>
              {s.pitch.length > 160 && (
                <button onClick={() => setPitchExpanded(x => !x)}
                  style={{ fontSize: 12, color: 'var(--faint)', marginTop: 3, padding: 0 }}>
                  {pitchExpanded ? 'Collapse' : 'Read full pitch'}
                </button>
              )}
            </div>
          )}

          {/* Extra info */}
          <div style={{ display: 'flex', gap: 8, flexWrap: 'wrap', marginBottom: 14 }}>
            {s.expected_comp && <Tag>💰 {s.expected_comp}</Tag>}
            {s.availability && <Tag>⏱ {s.availability}</Tag>}
            {s.work_auth && <Tag>{s.work_auth}</Tag>}
          </div>

          {/* Status control */}
          <div style={{ display: 'flex', gap: 10, alignItems: 'flex-start', flexWrap: 'wrap' }}>
            <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
              <span style={{ fontSize: 12.5, color: 'var(--muted)', fontWeight: 500 }}>Status:</span>
              <select
                value={status}
                onChange={e => handleStatusChange(e.target.value)}
                disabled={saving}
                style={{
                  border: '1px solid var(--line)', borderRadius: 6, padding: '5px 10px',
                  fontSize: 13, outline: 'none', background: 'var(--panel)',
                  cursor: 'pointer', appearance: 'auto',
                }}
              >
                <option>Submitted</option>
                <option>Interviewing</option>
                <option>Hired</option>
                <option>Rejected</option>
              </select>
              {saving && <span style={{ fontSize: 12, color: 'var(--faint)' }}>Saving…</span>}
            </div>

            {status === 'Rejected' && (
              <div style={{ flex: 1, display: 'flex', gap: 8, alignItems: 'flex-end', minWidth: 260 }}>
                <div style={{ flex: 1 }}>
                  <textarea
                    value={note}
                    onChange={e => setNote(e.target.value)}
                    placeholder="Rejection feedback for the recruiter (optional)"
                    rows={2}
                    style={{
                      width: '100%', border: '1px solid var(--line)', borderRadius: 6,
                      padding: '7px 10px', fontSize: 12.5, resize: 'vertical',
                      outline: 'none', background: 'var(--bg)', lineHeight: 1.5,
                    }}
                  />
                </div>
                <Btn variant="primary" small onClick={handleSaveNote} disabled={saving}>Save</Btn>
              </div>
            )}
          </div>
        </div>
      </div>
    </div>
  );
}

// ── Sidebar nav ───────────────────────────────────────────────────────────────
function AdminSidebar({ page, setPage, onLogout, recruiterPending, submissionPending }) {
  const navItems = [
    { id: 'recruiters', label: 'Recruiters', badge: recruiterPending || null, icon: '👤' },
    { id: 'candidates', label: 'Candidates', badge: submissionPending || null, icon: '📋' },
  ];
  return (
    <div style={{
      width: 220, flexShrink: 0, background: 'var(--panel)', borderRight: '1px solid var(--line)',
      display: 'flex', flexDirection: 'column', minHeight: '100vh',
      position: 'sticky', top: 0, height: '100vh',
    }}>
      {/* Logo */}
      <div style={{ padding: '20px 20px 16px', borderBottom: '1px solid var(--line)' }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 9 }}>
          <div style={{ width: 30, height: 30, borderRadius: 8, background: 'var(--ink)', display: 'inline-flex', alignItems: 'center', justifyContent: 'center' }}>
            <span style={{ color: '#fff', fontWeight: 700, fontSize: 13 }}>H</span>
          </div>
          <div>
            <div style={{ fontWeight: 700, fontSize: 14, letterSpacing: '-0.02em', lineHeight: 1.2 }}>HyperHire</div>
            <div style={{ fontSize: 11, color: 'var(--faint)', fontWeight: 500 }}>Admin panel</div>
          </div>
        </div>
      </div>

      {/* Nav */}
      <div style={{ padding: '12px 10px', flex: 1 }}>
        {navItems.map(item => (
          <button key={item.id} onClick={() => setPage(item.id)} style={{
            width: '100%', textAlign: 'left', padding: '9px 12px', borderRadius: 7,
            display: 'flex', alignItems: 'center', gap: 10, marginBottom: 2,
            background: page === item.id ? 'var(--line-2)' : 'transparent',
            color: page === item.id ? 'var(--ink)' : 'var(--muted)',
            fontWeight: page === item.id ? 600 : 400, fontSize: 13.5,
            transition: 'background 0.1s, color 0.1s',
          }}>
            <span style={{ fontSize: 15 }}>{item.icon}</span>
            <span style={{ flex: 1 }}>{item.label}</span>
            {item.badge > 0 && (
              <span style={{
                fontSize: 11, fontWeight: 600, background: 'var(--warn-bg)', color: 'var(--warn-ink)',
                padding: '1px 7px', borderRadius: 999, minWidth: 20, textAlign: 'center',
              }}>{item.badge}</span>
            )}
          </button>
        ))}
      </div>

      {/* Sign out */}
      <div style={{ padding: '12px 10px', borderTop: '1px solid var(--line)' }}>
        <button onClick={onLogout} style={{
          width: '100%', textAlign: 'left', padding: '9px 12px', borderRadius: 7,
          display: 'flex', alignItems: 'center', gap: 10,
          color: 'var(--muted)', fontSize: 13, fontWeight: 400,
        }}>
          <span style={{ fontSize: 15 }}>↩</span> Sign out
        </button>
      </div>
    </div>
  );
}

// ── Dashboard shell ───────────────────────────────────────────────────────────
function Dashboard({ onLogout }) {
  const [page, setPage] = useState('recruiters');
  const [recruiterPending, setRecruiterPending] = useState(0);
  const [submissionPending, setSubmissionPending] = useState(0);

  useEffect(() => {
    window.sb.from('hh_recruiters').select('id', { count: 'exact', head: true })
      .eq('is_vetted', false).eq('is_archived', false)
      .then(({ count }) => setRecruiterPending(count ?? 0));
    window.sb.from('hh_submissions').select('id', { count: 'exact', head: true })
      .eq('status', 'Submitted')
      .then(({ count }) => setSubmissionPending(count ?? 0));
  }, []);

  return (
    <div style={{ display: 'flex', minHeight: '100vh', background: 'var(--bg)' }}>
      <AdminSidebar page={page} setPage={setPage} onLogout={onLogout}
        recruiterPending={recruiterPending} submissionPending={submissionPending} />
      <div style={{ flex: 1, minWidth: 0, overflowY: 'auto' }}>
        {page === 'recruiters' ? <RecruitersPanel /> : <CandidatesPanel />}
      </div>
    </div>
  );
}

// ── Root ─────────────────────────────────────────────────────────────────────
function AdminApp() {
  const [session, setSession] = useState(undefined);

  useEffect(() => {
    window.sb.auth.getSession().then(({ data }) => {
      const s = data.session;
      setSession(s?.user?.email === ADMIN_EMAIL ? s : null);
    });
    window.sb.auth.onAuthStateChange((_, s) => {
      setSession(s?.user?.email === ADMIN_EMAIL ? s : null);
    });
  }, []);

  const handleLogout = () => { window.sb.auth.signOut(); setSession(null); };

  if (session === undefined) {
    return (
      <div style={{ minHeight: '100vh', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
        <div style={{ fontSize: 13, color: 'var(--muted)' }}>Loading…</div>
      </div>
    );
  }

  if (!session) return <LoginScreen onSession={setSession} />;
  return <Dashboard onLogout={handleLogout} />;
}

ReactDOM.createRoot(document.getElementById('root')).render(<AdminApp />);
</script>
</body>
