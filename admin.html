<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>HyperHire — Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #FAFAF7; --panel: #FFFFFE; --ink: #111110; --ink-2: #3A3A35;
    --muted: #6B6B63; --faint: #9A9A90; --line: #E8E6DF; --line-2: #F0EEE7;
    --accent: oklch(0.62 0.12 145); --accent-bg: oklch(0.96 0.03 145); --accent-ink: oklch(0.38 0.09 145);
    --warn-bg: oklch(0.96 0.04 75); --warn-ink: oklch(0.45 0.10 65);
    --rose-bg: oklch(0.95 0.03 25); --rose-ink: oklch(0.45 0.10 25);
    --blue-bg: oklch(0.96 0.03 250); --blue-ink: oklch(0.45 0.10 250);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--ink);
    font-family: 'Inter', -apple-system, sans-serif; font-size: 14px; line-height: 1.5;
    -webkit-font-smoothing: antialiased; }
  .mono { font-family: 'IBM Plex Mono', ui-monospace, monospace; }
  button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }
  input { font-family: inherit; font-size: inherit; color: inherit; }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
  .skeleton { animation: pulse 1.5s ease-in-out infinite; background: var(--line-2); border-radius: 4px; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>

<script>
  const SUPABASE_URL = 'https://ytnkupxvzulgtvpdnvps.supabase.co';
  const SUPABASE_ANON_KEY = 'sb_publishable_kHM9zr0VEFsy_kNWRtdaXA_i0iSO3Dv';
  window.sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
</script>

<script type="text/babel">
const { useState, useEffect, useCallback } = React;
const ADMIN_EMAIL = 'nicolas@hypertalent.me';

// ── Avatar ──────────────────────────────────────────────────────────────────
function Avatar({ name, size = 32 }) {
  const initials = (name || '?').split(' ').slice(0, 2).map(w => w[0]).join('').toUpperCase();
  const hues = [145, 250, 60, 25, 200, 40, 290, 80];
  let hash = 0;
  for (const c of (name || '')) hash = (hash * 31 + c.charCodeAt(0)) & 0xffffffff;
  const hue = hues[Math.abs(hash) % hues.length];
  const bg = `oklch(0.88 0.06 ${hue})`;
  const color = `oklch(0.38 0.09 ${hue})`;
  return (
    <div style={{
      width: size, height: size, borderRadius: '50%', background: bg, color,
      display: 'inline-flex', alignItems: 'center', justifyContent: 'center',
      fontSize: size * 0.36, fontWeight: 700, flexShrink: 0, letterSpacing: '-0.02em',
    }}>{initials}</div>
  );
}

// ── Btn ─────────────────────────────────────────────────────────────────────
function Btn({ children, variant = 'ghost', onClick, disabled, small }) {
  const styles = {
    primary: { background: 'var(--ink)', color: '#fff', border: 'none' },
    accent:  { background: 'var(--accent)', color: '#fff', border: 'none' },
    danger:  { background: 'var(--rose-bg)', color: 'var(--rose-ink)', border: '1px solid oklch(0.88 0.04 25)' },
    ghost:   { background: 'var(--panel)', color: 'var(--ink)', border: '1px solid var(--line)' },
    warn:    { background: 'var(--warn-bg)', color: 'var(--warn-ink)', border: '1px solid oklch(0.88 0.05 75)' },
  };
  return (
    <button
      onClick={onClick}
      disabled={disabled}
      style={{
        ...styles[variant],
        padding: small ? '5px 12px' : '8px 16px',
        borderRadius: 6, fontSize: small ? 12.5 : 13.5, fontWeight: 500,
        opacity: disabled ? 0.5 : 1, cursor: disabled ? 'not-allowed' : 'pointer',
        display: 'inline-flex', alignItems: 'center', gap: 6,
        transition: 'opacity 0.1s',
      }}
    >{children}</button>
  );
}

// ── Chip badge ───────────────────────────────────────────────────────────────
function Tag({ children, tone = 'neutral' }) {
  const colors = {
    neutral: { bg: '#F0EEE7', color: 'var(--muted)' },
    accent:  { bg: 'var(--accent-bg)', color: 'var(--accent-ink)' },
    blue:    { bg: 'var(--blue-bg)', color: 'var(--blue-ink)' },
    warn:    { bg: 'var(--warn-bg)', color: 'var(--warn-ink)' },
    rose:    { bg: 'var(--rose-bg)', color: 'var(--rose-ink)' },
  };
  const c = colors[tone] || colors.neutral;
  return (
    <span style={{
      display: 'inline-block', padding: '2px 8px', borderRadius: 999,
      fontSize: 11.5, fontWeight: 500, background: c.bg, color: c.color,
    }}>{children}</span>
  );
}

// ── Login ────────────────────────────────────────────────────────────────────
function LoginScreen({ onSession }) {
  const [email, setEmail] = useState(ADMIN_EMAIL);
  const [password, setPassword] = useState('');
  const [error, setError] = useState('');
  const [loading, setLoading] = useState(false);

  const handleLogin = async () => {
    setLoading(true); setError('');
    const { data, error: e } = await window.sb.auth.signInWithPassword({ email, password });
    if (e || data?.user?.email !== ADMIN_EMAIL) {
      setError(e?.message || 'Access denied.');
      setLoading(false); return;
    }
    onSession(data.session);
  };

  return (
    <div style={{ minHeight: '100vh', display: 'flex', alignItems: 'center', justifyContent: 'center', background: 'var(--bg)', padding: 24 }}>
      <div style={{ width: '100%', maxWidth: 380 }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginBottom: 32 }}>
          <div style={{ width: 34, height: 34, borderRadius: 9, background: 'var(--ink)', display: 'inline-flex', alignItems: 'center', justifyContent: 'center' }}>
            <span style={{ color: '#fff', fontWeight: 700, fontSize: 15 }}>H</span>
          </div>
          <div>
            <div style={{ fontWeight: 700, fontSize: 15, letterSpacing: '-0.02em' }}>HyperHire</div>
            <div style={{ fontSize: 11.5, color: 'var(--faint)', marginTop: -1 }}>Admin panel</div>
          </div>
        </div>

        <div style={{ border: '1px solid var(--line)', borderRadius: 12, background: 'var(--panel)', padding: '28px 26px' }}>
          <div style={{ fontSize: 18, fontWeight: 700, letterSpacing: '-0.02em', marginBottom: 20 }}>Sign in</div>
          <div style={{ display: 'flex', flexDirection: 'column', gap: 12 }}>
            <FieldInput label="Email" type="email" value={email} onChange={setEmail} />
            <FieldInput label="Password" type="password" value={password} onChange={setPassword}
              onKeyDown={e => e.key === 'Enter' && handleLogin()} />
          </div>
          {error && <div style={{ marginTop: 12, fontSize: 13, color: 'var(--rose-ink)', padding: '8px 12px', background: 'var(--rose-bg)', borderRadius: 6 }}>{error}</div>}
          <div style={{ marginTop: 18 }}>
            <Btn variant="primary" onClick={handleLogin} disabled={loading}>
              {loading ? 'Signing in…' : 'Sign in'}
            </Btn>
          </div>
        </div>
      </div>
    </div>
  );
}

function FieldInput({ label, type = 'text', value, onChange, onKeyDown }) {
  return (
    <div>
      <div style={{ fontSize: 12.5, fontWeight: 500, color: 'var(--muted)', marginBottom: 5 }}>{label}</div>
      <input
        type={type} value={value}
        onChange={e => onChange(e.target.value)}
        onKeyDown={onKeyDown}
        style={{
          width: '100%', border: '1px solid var(--line)', borderRadius: 6,
          padding: '9px 11px', fontSize: 13.5, outline: 'none',
          background: 'var(--bg)',
        }}
      />
    </div>
  );
}

// ── Dashboard ────────────────────────────────────────────────────────────────
function Dashboard({ onLogout }) {
  const [recruiters, setRecruiters] = useState([]);
  const [loading, setLoading] = useState(true);
  const [tab, setTab] = useState('pending');
  const [actionId, setActionId] = useState(null);

  const load = useCallback(async () => {
    setLoading(true);
    const { data } = await window.sb
      .from('hh_recruiters')
      .select('*')
      .order('created_at', { ascending: false });
    setRecruiters(data || []);
    setLoading(false);
  }, []);

  useEffect(() => { load(); }, [load]);

  const approve = async (email) => {
    setActionId(email);
    await window.sb.from('hh_recruiters').update({ is_vetted: true }).eq('email', email);
    setRecruiters(prev => prev.map(r => r.email === email ? { ...r, is_vetted: true } : r));
    setActionId(null);
  };

  const revoke = async (email) => {
    setActionId(email);
    await window.sb.from('hh_recruiters').update({ is_vetted: false }).eq('email', email);
    setRecruiters(prev => prev.map(r => r.email === email ? { ...r, is_vetted: false } : r));
    setActionId(null);
  };

  const reject = async (email, name) => {
    if (!window.confirm(`Remove ${name || email} from the platform? This cannot be undone.`)) return;
    setActionId(email);
    await window.sb.from('hh_recruiters').delete().eq('email', email);
    setRecruiters(prev => prev.filter(r => r.email !== email));
    setActionId(null);
  };

  const pending  = recruiters.filter(r => !r.is_vetted);
  const approved = recruiters.filter(r => r.is_vetted);
  const displayed = tab === 'pending' ? pending : tab === 'approved' ? approved : recruiters;

  const tabs = [
    { id: 'pending',  label: 'Pending',  count: pending.length },
    { id: 'approved', label: 'Approved', count: approved.length },
    { id: 'all',      label: 'All',      count: recruiters.length },
  ];

  return (
    <div style={{ minHeight: '100vh', background: 'var(--bg)' }}>
      {/* Top bar */}
      <div style={{
        position: 'sticky', top: 0, zIndex: 50,
        background: 'var(--panel)', borderBottom: '1px solid var(--line)',
        padding: '0 32px', display: 'flex', alignItems: 'center', height: 56, gap: 16,
      }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 9 }}>
          <div style={{ width: 28, height: 28, borderRadius: 7, background: 'var(--ink)', display: 'inline-flex', alignItems: 'center', justifyContent: 'center' }}>
            <span style={{ color: '#fff', fontWeight: 700, fontSize: 12 }}>H</span>
          </div>
          <span style={{ fontWeight: 700, fontSize: 14, letterSpacing: '-0.02em' }}>HyperHire</span>
          <span style={{ fontSize: 12, color: 'var(--faint)', padding: '2px 8px', background: '#F0EEE7', borderRadius: 4, fontWeight: 500 }}>Admin</span>
        </div>
        <div style={{ flex: 1 }} />
        <Btn variant="ghost" small onClick={onLogout}>Sign out</Btn>
      </div>

      {/* Page */}
      <div style={{ maxWidth: 860, margin: '0 auto', padding: '32px 24px' }}>
        <div style={{ marginBottom: 24 }}>
          <h1 style={{ margin: 0, fontSize: 22, fontWeight: 700, letterSpacing: '-0.02em' }}>Recruiter applications</h1>
          <p style={{ margin: '4px 0 0', fontSize: 13.5, color: 'var(--muted)' }}>
            Review profiles and approve access. Approved recruiters can immediately see and submit to open roles.
          </p>
        </div>

        {/* Tabs */}
        <div style={{ display: 'flex', gap: 2, borderBottom: '1px solid var(--line)', marginBottom: 20 }}>
          {tabs.map(t => (
            <button key={t.id} onClick={() => setTab(t.id)} style={{
              padding: '9px 16px', fontSize: 13.5, fontWeight: 500,
              color: tab === t.id ? 'var(--ink)' : 'var(--muted)',
              borderBottom: tab === t.id ? '2px solid var(--ink)' : '2px solid transparent',
              marginBottom: -1, display: 'inline-flex', alignItems: 'center', gap: 8,
            }}>
              {t.label}
              <span className="mono" style={{ fontSize: 11, color: 'var(--faint)', padding: '1px 6px', background: '#F3F1EA', borderRadius: 999 }}>{t.count}</span>
            </button>
          ))}
        </div>

        {/* List */}
        {loading ? (
          <div style={{ display: 'flex', flexDirection: 'column', gap: 12 }}>
            {[1,2,3].map(i => (
              <div key={i} style={{ border: '1px solid var(--line)', borderRadius: 10, background: 'var(--panel)', padding: 20 }}>
                <div style={{ display: 'flex', gap: 12, alignItems: 'flex-start' }}>
                  <div className="skeleton" style={{ width: 42, height: 42, borderRadius: '50%' }} />
                  <div style={{ flex: 1, display: 'flex', flexDirection: 'column', gap: 8 }}>
                    <div className="skeleton" style={{ height: 14, width: '30%' }} />
                    <div className="skeleton" style={{ height: 12, width: '50%' }} />
                    <div className="skeleton" style={{ height: 12, width: '70%' }} />
                  </div>
                </div>
              </div>
            ))}
          </div>
        ) : displayed.length === 0 ? (
          <div style={{ padding: '60px 24px', textAlign: 'center', color: 'var(--muted)', fontSize: 13.5 }}>
            {tab === 'pending' ? 'No pending applications.' : 'No recruiters in this category.'}
          </div>
        ) : (
          <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
            {displayed.map(r => (
              <RecruiterCard
                key={r.email} recruiter={r}
                busy={actionId === r.email}
                onApprove={() => approve(r.email)}
                onRevoke={() => revoke(r.email)}
                onReject={() => reject(r.email, r.name)}
              />
            ))}
          </div>
        )}
      </div>
    </div>
  );
}

// ── Recruiter card ────────────────────────────────────────────────────────────
function RecruiterCard({ recruiter: r, busy, onApprove, onRevoke, onReject }) {
  const [expanded, setExpanded] = useState(false);

  const daysAgo = r.created_at
    ? Math.floor((Date.now() - new Date(r.created_at)) / 86400000)
    : null;

  const fns = Array.isArray(r.functions) ? r.functions : [];
  const locs = Array.isArray(r.locations) ? r.locations : [];

  return (
    <div style={{
      border: r.is_vetted ? '1.5px solid var(--accent)' : '1px solid var(--line)',
      borderRadius: 10, background: 'var(--panel)', padding: '18px 20px',
      transition: 'border-color 0.15s',
    }}>
      {/* Header row */}
      <div style={{ display: 'flex', gap: 14, alignItems: 'flex-start' }}>
        <Avatar name={r.name} size={42} />

        <div style={{ flex: 1, minWidth: 0 }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 10, flexWrap: 'wrap', marginBottom: 4 }}>
            <span style={{ fontSize: 15, fontWeight: 600, letterSpacing: '-0.01em' }}>{r.name || '—'}</span>
            {r.is_vetted
              ? <Tag tone="accent">✓ Approved</Tag>
              : <Tag tone="warn">Pending review</Tag>}
            {daysAgo !== null && (
              <span style={{ fontSize: 12, color: 'var(--faint)', marginLeft: 'auto' }}>
                Applied {daysAgo === 0 ? 'today' : `${daysAgo}d ago`}
              </span>
            )}
          </div>

          <div style={{ display: 'flex', gap: 14, alignItems: 'center', flexWrap: 'wrap', fontSize: 13, color: 'var(--muted)' }}>
            <span>{r.email}</span>
            {r.linkedin_url && (
              <a href={r.linkedin_url} target="_blank" rel="noopener noreferrer"
                style={{ color: 'var(--blue-ink)', textDecoration: 'none', display: 'inline-flex', alignItems: 'center', gap: 3 }}
                onClick={e => e.stopPropagation()}>
                LinkedIn ↗
              </a>
            )}
          </div>

          {/* Tags row */}
          <div style={{ display: 'flex', gap: 6, flexWrap: 'wrap', marginTop: 10 }}>
            {r.years_exp && <Tag>{r.years_exp}</Tag>}
            {fns.map(f => <Tag key={f} tone="blue">{f}</Tag>)}
            {locs.map(l => <Tag key={l}>{l}</Tag>)}
          </div>

          {/* Bio */}
          {r.bio && (
            <div
              onClick={() => setExpanded(x => !x)}
              style={{
                marginTop: 12, fontSize: 13, color: 'var(--ink-2)', lineHeight: 1.6,
                cursor: 'pointer',
                display: expanded ? 'block' : '-webkit-box',
                WebkitLineClamp: expanded ? 'unset' : 2,
                WebkitBoxOrient: 'vertical',
                overflow: expanded ? 'visible' : 'hidden',
              }}>
              "{r.bio}"
            </div>
          )}
          {r.bio && r.bio.length > 120 && (
            <button onClick={() => setExpanded(x => !x)}
              style={{ fontSize: 12, color: 'var(--faint)', marginTop: 2, padding: 0 }}>
              {expanded ? 'Show less' : 'Show more'}
            </button>
          )}
        </div>

        {/* Actions */}
        <div style={{ display: 'flex', gap: 8, flexShrink: 0, alignItems: 'center' }}>
          {!r.is_vetted ? (
            <>
              <Btn variant="danger" small onClick={onReject} disabled={busy}>Reject</Btn>
              <Btn variant="accent" small onClick={onApprove} disabled={busy}>
                {busy ? '…' : '✓ Approve'}
              </Btn>
            </>
          ) : (
            <Btn variant="warn" small onClick={onRevoke} disabled={busy}>
              {busy ? '…' : 'Revoke'}
            </Btn>
          )}
        </div>
      </div>
    </div>
  );
}

// ── Root ─────────────────────────────────────────────────────────────────────
function AdminApp() {
  const [session, setSession] = useState(undefined); // undefined = loading

  useEffect(() => {
    window.sb.auth.getSession().then(({ data }) => {
      const s = data.session;
      setSession(s?.user?.email === ADMIN_EMAIL ? s : null);
    });
    window.sb.auth.onAuthStateChange((_, s) => {
      setSession(s?.user?.email === ADMIN_EMAIL ? s : null);
    });
  }, []);

  const handleLogout = () => {
    window.sb.auth.signOut();
    setSession(null);
  };

  if (session === undefined) {
    return (
      <div style={{ minHeight: '100vh', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
        <div style={{ fontSize: 13, color: 'var(--muted)' }}>Loading…</div>
      </div>
    );
  }

  if (!session) return <LoginScreen onSession={setSession} />;
  return <Dashboard onLogout={handleLogout} />;
}

ReactDOM.createRoot(document.getElementById('root')).render(<AdminApp />);
</script>
</body>
</html>
